<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} ?: 'Flopkart'">Flopkart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f1f3f6; color: #212121; }
html, body {
    height: 100%;
}

body {
    display: flex;
    flex-direction: column;
}
        /* Main content */

        /* Flash messages */
        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4caf50; }
        .alert-error   { background: #ffebee; color: #c62828; border-left: 4px solid #f44336; }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            text-align: center;
        }
        .btn-primary  { background: #fb641b; color: white; }
        .btn-blue     { background: #2874f0; color: white; }
        .btn-danger   { background: #ff4444; color: white; }
        .btn-secondary{ background: #e0e0e0; color: #212121; }

        footer {
            text-align: center;
            padding: 24px;
            background: #212121;
            color: #9e9e9e;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div th:fragment="header">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">

    <!-- Logo -->
    <a class="navbar-brand fw-bold" th:href="@{/}">
        Flop<span style="color: #ffe500;">kart</span>
    </a>

    <!-- Toggle (mobile) -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Content -->
    <div class="collapse navbar-collapse" id="navbarContent">

        <!-- Search -->
        <form class="d-flex mx-auto w-50" th:action="@{/products/search}" method="get">
            <input class="form-control me-2"
                type="search"
                name="keyword"
                placeholder="Search for products..."
                th:value="${param.keyword}">
            
            <button class="btn btn-light" type="submit">🔍</button>
        </form>

        <!-- Links -->
        <ul class="navbar-nav ms-auto align-items-center">

            <!-- Guest -->
            <li class="nav-item" sec:authorize="isAnonymous()">
                <a class="nav-link text-white" th:href="@{/auth/login}">Login</a>
            </li>

            <li class="nav-item" sec:authorize="isAnonymous()">
                <a class="nav-link text-white" th:href="@{/auth/register}">Register</a>
            </li>

            <!-- Logged in -->
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link text-white" th:href="@{/cart}">🛒 Cart</a>
            </li>

            <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link text-white" th:href="@{/orders}">My Orders</a>
            </li>

            <li class="nav-item" sec:authorize="hasRole('SELLER')">
                <a class="nav-link text-white" th:href="@{/seller/dashboard}">My Shop</a>
            </li>

            <li class="nav-item" sec:authorize="isAuthenticated()">
                <form th:action="@{/auth/logout}" method="post" style="display:inline;">
                    <input type="hidden"
                        th:name="${_csrf.parameterName}"
                        th:value="${_csrf.token}" />
                    <button type="submit"
                            class="nav-link btn btn-link text-white"
                            style="text-decoration:none;">
                        Logout
                    </button>
                </form>
            </li>

        </ul>
    </div>
</nav>

<!-- Main content slot is in each page template directly -->

</div> <!-- end header fragment -->

<main class="flex-grow-1">
        <div th:replace="~{::body}"></div>
    </main>

<div th:fragment="footer">
    <footer class="bg-dark text-light py-3 ">
        <div class="container text-center">
            &copy; 2024 Flopkart &mdash; OOAD Mini Project &mdash; Team of 4
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
