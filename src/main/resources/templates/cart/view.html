<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Cart — Flopkart</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<main>
   <div th:replace="~{layout :: header}"></div>
  <div class="container py-4">

    <h2 class="mb-4">🛒 My Cart</h2>

    <!-- ── Flash messages ──────────────────────────────────────── -->
    <!-- These come from RedirectAttributes in the controller -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-danger"  th:text="${errorMessage}"></div>

    <!-- ── Empty cart state ────────────────────────────────────── -->
    <div th:if="${cart.empty}" class="text-center py-5">
      <h4 class="text-muted">Your cart is empty</h4>
      <a href="/products" class="btn btn-primary mt-3">Continue Shopping</a>
    </div>

    <!-- ── Cart has items ──────────────────────────────────────── -->
    <div th:unless="${cart.empty}">

      <div class="row">

        <!-- Left column: cart items table -->
        <div class="col-md-8">
          <div class="card">
            <div class="card-body p-0">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>

                  <!-- th:each loops over cart.getItems() -->
                  <tr th:each="item : ${cart.items}">

                    <!-- Product image + name -->
                    <td class="align-middle">
                      <div class="d-flex align-items-center gap-3">
                        <img th:src="${item.product.imageUrl}"
                             th:alt="${item.product.name}"
                             style="width:60px; height:60px; object-fit:cover;"
                             class="rounded"
                             onerror="this.src='/images/placeholder.png'">
                        <div>
                          <div class="fw-semibold" th:text="${item.product.name}">Product Name</div>
                          <small class="text-muted" th:text="${item.product.brand}">Brand</small>
                        </div>
                      </div>
                    </td>

                    <!-- Unit price -->
                    <td class="align-middle">
                      ₹<span th:text="${item.product.price}">0.00</span>
                    </td>

                    <!-- Quantity update form -->
                    <!-- Each row has its own mini-form for quantity -->
                    <td class="align-middle" style="width: 140px;">
                      <form th:action="@{/cart/update}" method="post" class="d-flex gap-1">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="cartItemId" th:value="${item.id}">
                        <input type="number"
                               name="quantity"
                               th:value="${item.quantity}"
                               min="0"
                               th:max="${item.product.stockQuantity}"
                               class="form-control form-control-sm"
                               style="width: 70px;">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">↻</button>
                      </form>
                      <small class="text-muted">
                        Stock: <span th:text="${item.product.stockQuantity}">0</span>
                      </small>
                    </td>

                    <!-- Line total: price × quantity -->
                    <td class="align-middle fw-semibold">
                      ₹<span th:text="${item.product.price * item.quantity}">0.00</span>
                    </td>

                    <!-- Remove button -->
                    <td class="align-middle">
                      <form th:action="@{/cart/remove}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="cartItemId" th:value="${item.id}">
                        <button type="submit"
                                class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('Remove this item?')">✕</button>
                      </form>
                    </td>

                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Clear cart button -->
          <form th:action="@{/cart/clear}" method="post" class="mt-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit"
                    class="btn btn-outline-secondary btn-sm"
                    onclick="return confirm('Clear entire cart?')">
              Clear Cart
            </button>
          </form>
        </div>

        <!-- Right column: order summary -->
        <div class="col-md-4">
          <div class="card">
            <div class="card-header fw-bold">Order Summary</div>
            <div class="card-body">

              <div class="d-flex justify-content-between mb-2">
                <span>Subtotal</span>
                <span>₹<span th:text="${#numbers.formatDecimal(subtotal, 1, 2)}">0.00</span></span>
              </div>

              <div class="d-flex justify-content-between mb-2 text-muted">
                <span>Shipping</span>
                <span>FREE</span>
              </div>

              <hr>

              <div class="d-flex justify-content-between fw-bold fs-5">
                <span>Total</span>
                <span>₹<span th:text="${#numbers.formatDecimal(subtotal, 1, 2)}">0.00</span></span>
              </div>

              <!-- Proceed to checkout — this goes to Member 4's controller -->
              <a href="/orders/checkout" class="btn btn-warning w-100 mt-3 fw-bold">
                Proceed to Checkout
              </a>

              <a href="/products" class="btn btn-outline-secondary w-100 mt-2">
                Continue Shopping
              </a>

            </div>
          </div>
        </div>

      </div>
    </div>
    <!-- end cart has items -->

  </div>
</main>
</body>

</html>

<!-- cart/view.html
Displays cart UI and sends user actions (update/remove)
OOAD: MVC (View) -->
