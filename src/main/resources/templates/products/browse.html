<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Flopkart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div th:replace="~{layout :: header}"></div>
<main class="flex-grow-1">
    <div>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <h1>Products</h1>
                <p class="text-muted">Add products to cart and test the full Order & Review flow.</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="/cart" class="btn btn-primary btn-lg">
                    🛒 View Cart & Checkout
                </a>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4 mt-4">
    
    <div th:each="product : ${products}" class="col">
        <div class="card h-100 shadow-sm position-relative">

            <!-- 🔥 Discount Badge -->
            <span th:if="${product.discountPercent > 0}" 
                  class="badge bg-danger position-absolute top-0 start-0 m-2">
                <span th:text="${product.discountPercent + '% OFF'}"></span>
            </span>

            <!-- 🖼️ Product Image -->
            <img th:if="${product.imageUrl}" 
                 th:src="${product.imageUrl}" 
                 class="card-img-top" 
                 style="height: 200px; object-fit: cover;"
                 th:alt="${product.name}">

            <div th:unless="${product.imageUrl}" 
                 class="card-img-top bg-light d-flex align-items-center justify-content-center"
                 style="height: 200px;">
                <span class="text-muted">No Image</span>
            </div>

            <!-- 📦 Card Body -->
            <div class="card-body d-flex flex-column">

                <h6 class="card-title" th:text="${product.name}">Product Name</h6>
                <p class="text-muted small" th:text="${product.brand}">Brand</p>

                <!-- 💰 Price Section -->
                <div class="mb-2">

                    <!-- Original Price -->
                    <span th:if="${product.discountPercent > 0}" 
                          class="text-muted text-decoration-line-through me-2">
                        ₹<span th:text="${product.price}"></span>
                    </span>

                    <!-- Final Price -->
                    <span class="fw-bold text-success">
                        ₹<span th:text="${product.price}"></span>
                        <!-- replace with finalPrice if you implement -->
                    </span>
                </div>

                <!-- 📦 Stock -->
                <div th:if="${product.stockQuantity > 0}" class="text-success small">
                    ✔ In Stock
                </div>
                <div th:unless="${product.stockQuantity > 0}" class="text-danger small">
                    ✖ Out of Stock
                </div>

                <!-- 🛒 Add to Cart -->
                <div class="mt-auto pt-3">
                    <form th:action="@{/cart/add}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="productId" th:value="${product.id}">

                        <input type="number" name="quantity" value="1" min="1"
                               class="form-control mb-2">

                        <button type="submit" class="btn btn-warning w-100"
                                th:disabled="${product.stockQuantity == 0}">
                            Add to Cart
                        </button>
                    </form>
                </div>
            </div>

            <!-- 👁️ Footer -->
            <div class="card-footer bg-transparent border-0">
                <a th:href="@{/products/{id}(id=${product.id})}" 
                   class="btn btn-outline-primary btn-sm w-100">
                    View Details
                </a>
            </div>

        </div>
    </div>

</div>
    </div>
    
</main>
    <!-- <div th:replace="~{layout :: footer}"></div> -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
