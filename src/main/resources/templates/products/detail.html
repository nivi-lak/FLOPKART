<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${product.name} + ' - Flopkart'">Product Detail - Flopkart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout :: header}"></div>

    <div class="container mt-5">

    <!-- 🔥 TOP SECTION -->
    <div class="row">

        <!-- 🖼️ LEFT: IMAGE -->
        <div class="col-md-5">
            <div class="card shadow-sm">
                <img th:if="${product.imageUrl}" 
                     th:src="${product.imageUrl}" 
                     class="img-fluid p-3"
                     style="max-height: 400px; object-fit: contain;"
                     th:alt="${product.name}">

                <div th:unless="${product.imageUrl}" 
                     class="d-flex align-items-center justify-content-center"
                     style="height: 400px;">
                    <span class="text-muted">No Image Available</span>
                </div>
            </div>
        </div>

        <!-- 📦 RIGHT: DETAILS -->
        <div class="col-md-7">
            <h2 th:text="${product.name}">Product Name</h2>
            <p class="text-muted" th:text="${product.category != null ? product.category.name : 'N/A'}"></p>

            <!-- 💰 Price -->
            <h3 class="text-success">
                ₹<span th:text="${product.price}">0.00</span>
            </h3>

            <!-- 📦 Stock -->
            <p th:if="${product.stockQuantity > 0}" class="text-success fw-bold">
                ✔ In Stock
            </p>
            <p th:unless="${product.stockQuantity > 0}" class="text-danger fw-bold">
                ✖ Out of Stock
            </p>

            <!-- 🛒 Add to Cart -->
            <div class="mt-3">
                <form th:action="@{/cart/add}" method="post" class="d-flex gap-2">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="productId" th:value="${product.id}" />

                    <input type="number" name="quantity" value="1" min="1"
                           class="form-control w-25" />

                    <button type="submit" class="btn btn-warning"
                            th:disabled="${product.stockQuantity == 0}">
                        Add to Cart
                    </button>
                </form>
            </div>

            <!-- ⭐ Rating -->
            <div th:if="${averageRating > 0}" class="mt-3">
                <span class="badge bg-success fs-6">
                    ⭐ <span th:text="${averageRating}">0.0</span> / 5
                </span>
            </div>

        </div>
    </div>

    <!-- 📄 DESCRIPTION -->
    <div class="mt-5">
        <h4>Description</h4>
        <p class="text-muted" th:text="${product.description}">Description</p>
    </div>

    <!-- ⭐ REVIEWS -->
    <div class="mt-5">
        <h4>Customer Reviews</h4>

        <div th:if="${#lists.isEmpty(reviews)}" class="alert alert-info">
            No reviews yet. Be the first to review this product.
        </div>

        <div th:each="review : ${reviews}" class="card mb-3 shadow-sm">
            <div class="card-body">

                <div class="d-flex justify-content-between">
                    <strong th:text="${review.user.fullName}">User</strong>
                    <small class="text-muted"
                           th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}">
                    </small>
                </div>

                <div class="mt-1">
                    <span class="badge bg-success">
                        ⭐ <span th:text="${review.rating}">0</span>/5
                    </span>
                </div>

                <p class="mt-2 mb-0" th:text="${review.comment}">Comment</p>

            </div>
        </div>
    </div>

</div>

    <div th:replace="~{layout :: footer}"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
