<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Products - Flopkart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .product-card {
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1;
        }
        .product-img {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-cart"></i> Flopkart
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link active" href="/products">Products</a>
                <a class="nav-link" href="/cart">
                    <i class="bi bi-cart3"></i> Cart
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Sidebar - Filters -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-funnel"></i> Filters</h5>
                    </div>
                    <div class="card-body">
                        <form action="/products/filter" method="get">
                            <!-- Search Keyword -->
                            <div class="mb-3">
                                <label for="keyword" class="form-label">Search</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="keyword" 
                                       name="keyword" 
                                       th:value="${keyword}"
                                       placeholder="Search products...">
                            </div>

                            <!-- Category Filter -->
                            <div class="mb-3">
                                <label for="categoryId" class="form-label">Category</label>
                                <select class="form-select" id="categoryId" name="categoryId">
                                    <option value="">All Categories</option>
                                    <option th:each="cat : ${categories}" 
                                            th:value="${cat.id}" 
                                            th:text="${cat.name}"
                                            th:selected="${cat.id == selectedCategoryId}">
                                        Category
                                    </option>
                                </select>
                            </div>

                            <!-- Price Range -->
                            <div class="mb-3">
                                <label class="form-label">Price Range</label>
                                <div class="row g-2">
                                    <div class="col">
                                        <input type="number" 
                                               class="form-control form-control-sm" 
                                               name="minPrice" 
                                               th:value="${minPrice}"
                                               placeholder="Min ₹">
                                    </div>
                                    <div class="col">
                                        <input type="number" 
                                               class="form-control form-control-sm" 
                                               name="maxPrice" 
                                               th:value="${maxPrice}"
                                               placeholder="Max ₹">
                                    </div>
                                </div>
                            </div>

                            <!-- Sort By -->
                            <div class="mb-3">
                                <label for="sort" class="form-label">Sort By</label>
                                <select class="form-select" id="sort" name="sort">
                                    <option value="newest" th:selected="${sortBy == 'newest'}">Newest First</option>
                                    <option value="price-asc" th:selected="${sortBy == 'price-asc'}">Price: Low to High</option>
                                    <option value="price-desc" th:selected="${sortBy == 'price-desc'}">Price: High to Low</option>
                                    <option value="name" th:selected="${sortBy == 'name'}">Name (A-Z)</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search"></i> Apply Filters
                            </button>
                            <a href="/products" class="btn btn-outline-secondary w-100 mt-2">
                                <i class="bi bi-x-circle"></i> Clear Filters
                            </a>
                        </form>
                    </div>
                </div>

                <!-- Quick Links -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h6 class="mb-0">Categories</h6>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:each="cat : ${categories}" 
                           th:href="@{/products/category/{id}(id=${cat.id})}" 
                           class="list-group-item list-group-item-action"
                           th:classappend="${cat.id == selectedCategoryId} ? 'active' : ''">
                            <span th:text="${cat.name}">Category</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Main Content - Product Grid -->
            <div class="col-md-9">
                <!-- Results Header -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h4>
                            <span th:if="${keyword}" th:text="'Search Results for: ' + ${keyword}">All Products</span>
                            <span th:unless="${keyword}">All Products</span>
                        </h4>
                        <p class="text-muted">
                            Showing <span th:text="${products.numberOfElements}">0</span> of 
                            <span th:text="${products.totalElements}">0</span> products
                        </p>
                    </div>
                </div>

                <!-- Product Grid -->
                <div th:if="${products.hasContent()}" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
                    <div th:each="product : ${products}" class="col">
                        <div class="card h-100 product-card position-relative">
                            <!-- Discount Badge -->
                            <span th:if="${product.discountPercent > 0}" 
                                  class="badge bg-danger discount-badge">
                                <span th:text="${product.discountPercent + '% OFF'}"></span>
                            </span>

                            <!-- Product Image -->
                            <img th:if="${product.imageUrl}" 
                                 th:src="${product.imageUrl}" 
                                 class="card-img-top product-img" 
                                 th:alt="${product.name}">
                            <div th:unless="${product.imageUrl}" 
                                 class="card-img-top product-img bg-light d-flex align-items-center justify-content-center">
                                <i class="bi bi-image text-muted" style="font-size: 3rem;"></i>
                            </div>

                            <div class="card-body d-flex flex-column">
                                <h6 class="card-title" th:text="${product.name}">Product Name</h6>
                                <p class="card-text text-muted small" th:text="${product.brand}">Brand</p>
                                
                                <div class="mt-auto">
                                    <div class="mb-2">
                                        <span th:if="${product.discountPercent > 0}" 
                                              class="text-muted text-decoration-line-through me-2">
                                            ₹<span th:text="${product.price}"></span>
                                        </span>
                                        <span class="h5 text-success mb-0">
                                            ₹<span th:text="${product.finalPrice}"></span>
                                        </span>
                                    </div>
                                    
                                    <div th:if="${product.isInStock()}" class="text-success small">
                                        <i class="bi bi-check-circle-fill"></i> In Stock
                                    </div>
                                    <div th:unless="${product.isInStock()}" class="text-danger small">
                                        <i class="bi bi-x-circle-fill"></i> Out of Stock
                                    </div>
                                </div>
                            </div>

                            <div class="card-footer bg-transparent">
                                <a th:href="@{/products/{id}(id=${product.id})}" 
                                   class="btn btn-sm btn-outline-primary w-100">
                                    <i class="bi bi-eye"></i> View Details
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- No Results -->
                <div th:unless="${products.hasContent()}" class="text-center py-5">
                    <i class="bi bi-search text-muted" style="font-size: 4rem;"></i>
                    <h4 class="mt-3">No products found</h4>
                    <p class="text-muted">Try adjusting your filters or search criteria</p>
                    <a href="/products" class="btn btn-primary">View All Products</a>
                </div>

                <!-- Pagination -->
                <nav th:if="${products.totalPages > 1}" class="mt-4">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${!products.hasPrevious()} ? 'disabled'">
                            <a class="page-link" 
                               th:href="@{${#httpServletRequest.requestURI}(page=${currentPage - 1}, sort=${sortBy}, keyword=${keyword}, categoryId=${selectedCategoryId}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                                Previous
                            </a>
                        </li>
                        
                        <li th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}" 
                            class="page-item"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link" 
                               th:href="@{${#httpServletRequest.requestURI}(page=${i}, sort=${sortBy}, keyword=${keyword}, categoryId=${selectedCategoryId}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
                               th:text="${i + 1}">1</a>
                        </li>
                        
                        <li class="page-item" th:classappend="${!products.hasNext()} ? 'disabled'">
                            <a class="page-link" 
                               th:href="@{${#httpServletRequest.requestURI}(page=${currentPage + 1}, sort=${sortBy}, keyword=${keyword}, categoryId=${selectedCategoryId}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                                Next
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
