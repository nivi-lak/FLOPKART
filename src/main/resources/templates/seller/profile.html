<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Profile - Flopkart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/seller/dashboard">
                <i class="bi bi-shop"></i> Flopkart Seller
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/seller/dashboard">Dashboard</a>
                <a class="nav-link active" href="/seller/profile">Profile</a>
                <a class="btn btn-outline-light btn-sm ms-2" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Success Message -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Error Message -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <!-- Left Column - Profile Display -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <div class="mb-3">
                            <img th:if="${seller.shopLogoUrl}" 
                                 th:src="${seller.shopLogoUrl}" 
                                 class="rounded-circle"
                                 style="width: 150px; height: 150px; object-fit: cover;"
                                 alt="Shop Logo">
                            <div th:unless="${seller.shopLogoUrl}" 
                                 class="rounded-circle bg-primary d-inline-flex align-items-center justify-content-center"
                                 style="width: 150px; height: 150px;">
                                <i class="bi bi-shop text-white" style="font-size: 4rem;"></i>
                            </div>
                        </div>
                        <h4 th:text="${seller.shopName}">Shop Name</h4>
                        <p class="text-muted" th:text="${user.email}">email@example.com</p>
                        <div class="mt-3">
                           
                        </div>
                        <div class="mt-3">
                            <p class="mb-1"><small class="text-muted">Member Since</small></p>
                            <p th:text="${#temporals.format(seller.joinedAt, 'MMMM dd, yyyy')}">Date</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column - Profile Details Form -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-person-circle"></i> Profile Information</h5>
                        <div th:if="${!isEditMode}">
                            <a href="/seller/profile/edit" class="btn btn-light btn-sm">
                                <i class="bi bi-pencil"></i> Edit Profile
                            </a>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- View Mode -->
                        <div th:if="${!isEditMode}">
                            <table class="table table-borderless">
                                <tr>
                                    <th width="40%">Shop Name:</th>
                                    <td th:text="${seller.shopName}"></td>
                                </tr>
                                <tr>
                                    <th>GST Number:</th>
                                    <td th:text="${seller.gstNumber}"></td>
                                </tr>
                                <tr>
                                    <th>Phone Number:</th>
                                    <td th:text="${seller.phoneNumber}"></td>
                                </tr>
                                <tr>
                                    <th>Bank Account:</th>
                                    <td th:text="${seller.bankAccount}"></td>
                                </tr>
                                <tr>
                                    <th>Business Address:</th>
                                    <td th:text="${seller.businessAddress ?: 'Not provided'}"></td>
                                </tr>
                                <tr>
                                    <th>Shop Description:</th>
                                    <td th:text="${seller.shopDescription ?: 'Not provided'}"></td>
                                </tr>
                                <tr>
                                    <th>Shop Logo URL:</th>
                                    <td>
                                        <span th:if="${seller.shopLogoUrl}">
                                            <a th:href="${seller.shopLogoUrl}" target="_blank">View Logo</a>
                                        </span>
                                        <span th:unless="${seller.shopLogoUrl}" class="text-muted">Not provided</span>
                                    </td>
                                </tr>
                            </table>
                        </div>

                        <!-- Edit Mode -->
                        <div th:if="${isEditMode}">
                            <form th:action="@{/seller/profile/edit}" th:object="${seller}" method="post">
                                <div class="mb-3">
                                    <label for="shopName" class="form-label">Shop Name *</label>
                                    <input type="text" class="form-control" id="shopName" 
                                           th:field="*{shopName}" th:errorclass="is-invalid" required>
                                    <div class="invalid-feedback" th:errors="*{shopName}"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="gstNumber" class="form-label">GST Number *</label>
                                    <input type="text" class="form-control" id="gstNumber" 
                                           th:field="*{gstNumber}" th:errorclass="is-invalid"
                                           pattern="[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}" required>
                                    <div class="form-text">Changing GST will require re-verification</div>
                                    <div class="invalid-feedback" th:errors="*{gstNumber}"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="phoneNumber" class="form-label">Phone Number *</label>
                                    <input type="tel" class="form-control" id="phoneNumber" 
                                           th:field="*{phoneNumber}" th:errorclass="is-invalid"
                                           pattern="[6-9][0-9]{9}" required>
                                    <div class="invalid-feedback" th:errors="*{phoneNumber}"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="bankAccount" class="form-label">Bank Account *</label>
                                    <input type="text" class="form-control" id="bankAccount" 
                                           th:field="*{bankAccount}" th:errorclass="is-invalid" required>
                                    <div class="invalid-feedback" th:errors="*{bankAccount}"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="businessAddress" class="form-label">Business Address</label>
                                    <textarea class="form-control" id="businessAddress" 
                                              th:field="*{businessAddress}" rows="2"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="shopDescription" class="form-label">Shop Description</label>
                                    <textarea class="form-control" id="shopDescription" 
                                              th:field="*{shopDescription}" rows="3"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="shopLogoUrl" class="form-label">Shop Logo URL</label>
                                    <input type="url" class="form-control" id="shopLogoUrl" 
                                           th:field="*{shopLogoUrl}">
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-save"></i> Save Changes
                                    </button>
                                    <a href="/seller/profile" class="btn btn-secondary">
                                        <i class="bi bi-x"></i> Cancel
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
