<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Seller Profile — Flopkart</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f3f6; color: #212121; }

        .navbar {
            background: #2874f0; padding: 14px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .navbar a { color: white; text-decoration: none; font-size: 22px; font-weight: 700; }
        .navbar-right { display: flex; gap: 20px; align-items: center; }
        .navbar-right a { color: white; font-size: 14px; text-decoration: none; }

        .container { max-width: 720px; margin: 32px auto; padding: 0 16px; }

        .card {
            background: white; border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12); overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, #2874f0, #0050c8);
            padding: 28px 32px; color: white;
            display: flex; align-items: center; gap: 20px;
        }
        .avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; flex-shrink: 0;
        }
        .profile-header h2 { font-size: 22px; }
        .profile-header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
        .badge-verified {
            display: inline-block; background: #43a047; color: white;
            font-size: 11px; padding: 2px 10px; border-radius: 12px;
            font-weight: 600; margin-top: 6px;
        }
        .badge-pending {
            display: inline-block; background: #ffa000; color: white;
            font-size: 11px; padding: 2px 10px; border-radius: 12px;
            font-weight: 600; margin-top: 6px;
        }

        .profile-body { padding: 28px 32px; }

        .alert-success {
            background: #e8f5e9; border-left: 4px solid #43a047;
            padding: 12px 16px; border-radius: 3px; margin-bottom: 20px;
            font-size: 14px; color: #256029;
        }

        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            margin-bottom: 28px;
        }
        .info-item label {
            font-size: 11px; font-weight: 600; color: #717171;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .info-item p { font-size: 15px; margin-top: 4px; }
        .info-item p.empty { color: #bdbdbd; font-style: italic; }

        .divider { height: 1px; background: #f0f0f0; margin: 24px 0; }

        .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-edit {
            padding: 10px 24px; background: #2874f0; color: white;
            border: none; border-radius: 3px; font-size: 14px; font-weight: 600;
            cursor: pointer; text-decoration: none;
        }
        .btn-edit:hover { background: #0050c8; }
        .btn-products {
            padding: 10px 24px; background: white; color: #2874f0;
            border: 2px solid #2874f0; border-radius: 3px; font-size: 14px;
            font-weight: 600; cursor: pointer; text-decoration: none;
        }
        .btn-products:hover { background: #e8f0fe; }

        .joined-note { font-size: 12px; color: #9e9e9e; margin-top: 16px; }
    </style>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}">Flopkart</a>
    <div class="navbar-right">
        <a th:href="@{/search}">Browse</a>
        <a th:href="@{/seller/profile/edit}">Edit Profile</a>
        <a th:href="@{/logout}">Logout</a>
    </div>
</nav>

<div class="container">

    <!-- Flash message -->
    <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <div class="card">

        <div class="profile-header">
            <div class="avatar" th:text="${#strings.substring(seller.shopName, 0, 1).toUpperCase()}">S</div>
            <div>
                <h2 th:text="${seller.shopName}">Shop Name</h2>
                <p th:text="${seller.user.fullName}">Seller Name</p>
                <p th:text="${seller.user.email}">email@example.com</p>
                <span class="badge-verified" th:if="${seller.verified}">✓ Verified Seller</span>
                <span class="badge-pending" th:unless="${seller.verified}">⏳ Verification Pending</span>
            </div>
        </div>

        <div class="profile-body">

            <div class="info-grid">
                <div class="info-item">
                    <label>GST Number</label>
                    <p th:text="${seller.gstNumber != null} ? ${seller.gstNumber} : ''"
                       th:classappend="${seller.gstNumber == null} ? 'empty' : ''">
                        Not provided
                    </p>
                </div>
                <div class="info-item">
                    <label>Phone Number</label>
                    <p th:text="${seller.phoneNumber != null} ? ${seller.phoneNumber} : ''"
                       th:classappend="${seller.phoneNumber == null} ? 'empty' : ''">
                        Not provided
                    </p>
                </div>
                <div class="info-item">
                    <label>Bank Account</label>
                    <p th:text="${seller.bankAccount != null} ? ${seller.bankAccount} : ''"
                       th:classappend="${seller.bankAccount == null} ? 'empty' : ''">
                        Not provided
                    </p>
                </div>
                <div class="info-item">
                    <label>Member Since</label>
                    <p th:text="${#temporals.format(seller.joinedAt, 'dd MMM yyyy')}">01 Jan 2025</p>
                </div>
            </div>

            <div class="divider"></div>

            <div class="btn-row">
                <a th:href="@{/seller/profile/edit}" class="btn-edit">Edit Profile</a>
                <a th:href="@{/products/my}" class="btn-products">My Products</a>
            </div>

            <p class="joined-note">
                Seller ID: #<span th:text="${seller.id}"></span>
            </p>

        </div>
    </div>
</div>

</body>
</html>
