<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Seller Registration — Flopkart</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f3f6; color: #212121; }

        .navbar {
            background: #2874f0; padding: 14px 24px;
            display: flex; align-items: center; gap: 16px;
        }
        .navbar a { color: white; text-decoration: none; font-size: 22px; font-weight: 700; }
        .navbar span { color: #ffffffb3; font-size: 14px; }

        .container { max-width: 560px; margin: 40px auto; padding: 0 16px; }

        .card {
            background: white; border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12); padding: 32px;
        }
        .card h2 { font-size: 20px; margin-bottom: 8px; }
        .card p.subtitle { color: #717171; font-size: 13px; margin-bottom: 24px; }

        .alert-success {
            background: #e8f5e9; border-left: 4px solid #43a047;
            padding: 12px 16px; border-radius: 3px; margin-bottom: 20px;
            font-size: 14px; color: #256029;
        }
        .alert-error {
            background: #fff3e0; border-left: 4px solid #e65100;
            padding: 12px 16px; border-radius: 3px; margin-bottom: 20px;
            font-size: 14px; color: #bf360c;
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        label .optional { font-weight: 400; color: #717171; }

        input[type="text"], input[type="number"] {
            width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0;
            border-radius: 3px; font-size: 14px; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: #2874f0; }
        input[readonly] { background: #f5f5f5; color: #717171; cursor: not-allowed; }

        .error-msg { color: #d32f2f; font-size: 12px; margin-top: 4px; }

        .btn-primary {
            width: 100%; padding: 12px; background: #fb641b; color: white;
            border: none; border-radius: 3px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-primary:hover { background: #e85d18; }

        .note {
            background: #e3f2fd; border-radius: 3px; padding: 12px 16px;
            font-size: 12px; color: #0d47a1; margin-top: 20px; line-height: 1.6;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}">Flopkart</a>
    <span>Seller Portal</span>
</nav>

<div class="container">
    <div class="card">

        <h2 th:text="${seller != null} ? 'Edit Seller Profile' : 'Register as a Seller'">
            Register as a Seller
        </h2>
        <p class="subtitle">
            Fill in your shop details to start selling on Flopkart.
        </p>

        <!-- Flash success message -->
        <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <!-- Global error (e.g. duplicate GST) -->
        <div class="alert-error"
        th:if="${errorMessage != null}"
        th:text="${errorMessage}">
        </div>

        <form th:action="${seller != null} ? @{/seller/profile/edit} : @{/seller/register}"
              th:object="${sellerForm}"
              method="post">

            <!-- CSRF token automatically injected by Thymeleaf + Spring Security -->

            <div class="form-group">
                <label for="shopName">Shop Name</label>
                <input type="text" id="shopName" th:field="*{shopName}"
                       placeholder="e.g. TechZone Electronics"/>
                <span class="error-msg" th:if="${#fields.hasErrors('shopName')}"
                      th:errors="*{shopName}"></span>
            </div>

            <div class="form-group">
                <label for="gstNumber">
                    GST Number
                    <span class="optional" th:if="${seller != null}">(not editable)</span>
                </label>
                <input type="text" id="gstNumber" th:field="*{gstNumber}"
                       th:readonly="${seller != null}"
                       placeholder="15-digit GST number"/>
                <span class="error-msg" th:if="${#fields.hasErrors('gstNumber')}"
                      th:errors="*{gstNumber}"></span>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input type="text" id="phoneNumber" th:field="*{phoneNumber}"
                       placeholder="10-digit mobile number"/>
                <span class="error-msg" th:if="${#fields.hasErrors('phoneNumber')}"
                      th:errors="*{phoneNumber}"></span>
            </div>

            <div class="form-group">
                <label for="bankAccount">
                    Bank Account <span class="optional">(optional)</span>
                </label>
                <input type="text" id="bankAccount" th:field="*{bankAccount}"
                       placeholder="Account number for payouts"/>
            </div>

            <button type="submit" class="btn-primary"
                    th:text="${seller != null} ? 'Update Profile' : 'Register Shop'">
                Register Shop
            </button>

        </form>

        <div class="note">
            &#9432; Your seller account will be reviewed for verification. You can start
            listing products immediately, but the <strong>Verified</strong> badge appears
            after admin approval.
        </div>

    </div>
</div>

</body>
</html>
