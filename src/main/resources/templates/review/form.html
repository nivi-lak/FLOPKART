<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Write Review - Flopkart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout :: header}"></div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4">Write a Review</h2>

                <!-- Product Info -->
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <img th:if="${product.imageUrl}" 
                                     th:src="${product.imageUrl}" 
                                     class="img-fluid rounded"
                                     style="max-height: 150px; object-fit: contain;"
                                     th:alt="${product.name}">
                            </div>
                            <div class="col-md-9">
                                <h5 th:text="${product.name}">Product Name</h5>
                                <p class="text-muted mb-2">
                                    Order #<span th:text="${order.id}"></span> 
                                    - Delivered <span th:text="${#temporals.format(order.updatedAt, 'dd MMM yyyy')}"></span>
                                </p>
                                <p class="text-muted small">
                                    Quantity: <span th:text="${order.items[0].quantity}">1</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Error Message -->
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Review Form -->
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/reviews/submit}" method="post" th:object="${reviewForm}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <input type="hidden" name="orderId" th:value="${order.id}">

                            <!-- Rating -->
                            <div class="mb-4">
                                <label for="rating" class="form-label fw-bold">Your Rating</label>
                                <select class="form-select form-select-lg" id="rating" name="rating" th:field="*{rating}" required>
                                    <option value="">-- Select a rating --</option>
                                    <option value="1">⭐ 1 Star - Poor</option>
                                    <option value="2">⭐⭐ 2 Stars - Below Average</option>
                                    <option value="3">⭐⭐⭐ 3 Stars - Average</option>
                                    <option value="4">⭐⭐⭐⭐ 4 Stars - Good</option>
                                    <option value="5">⭐⭐⭐⭐⭐ 5 Stars - Excellent</option>
                                </select>
                                <small class="text-danger" th:if="${#fields.hasErrors('rating')}">
                                    <span th:errors="*{rating}"></span>
                                </small>
                            </div>

                            <!-- Comment -->
                            <div class="mb-4">
                                <label for="comment" class="form-label fw-bold">Your Review (Optional)</label>
                                <textarea class="form-control" id="comment" name="comment" th:field="*{comment}" 
                                          rows="5" placeholder="Share your experience with this product..."
                                          maxlength="1000"></textarea>
                                <small class="text-muted d-block mt-2">
                                    <span id="charCount">0</span>/1000 characters
                                </small>
                                <small class="text-danger" th:if="${#fields.hasErrors('comment')}">
                                    <span th:errors="*{comment}"></span>
                                </small>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    ✓ Submit Review
                                </button>
                                <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-outline-secondary btn-lg">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Character counter
        const commentInput = document.getElementById('comment');
        const charCount = document.getElementById('charCount');
        
        commentInput.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });
    </script>
</body>
</html>
