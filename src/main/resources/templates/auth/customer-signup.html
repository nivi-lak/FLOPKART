<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Sign Up - Flopkart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 0;
        }
        .signup-card {
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card signup-card">
                    <div class="card-body p-5">
                        <!-- Header -->
                        <div class="text-center mb-4">
                            <i class="bi bi-person-plus-fill text-primary" style="font-size: 3.5rem;"></i>
                            <h3 class="fw-bold mt-3">Create Customer Account</h3>
                            <p class="text-muted">Join Flopkart and start shopping!</p>
                        </div>

                        <!-- Error Message -->
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <span th:text="${error}">Error message</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Registration Form -->
                        <form th:action="@{/auth/customer/signup}" th:object="${customer}" method="post">
                            
                            <!-- Full Name -->
                            <div class="mb-3">
                                <label for="fullName" class="form-label">
                                    <i class="bi bi-person"></i> Full Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" 
                                       class="form-control" 
                                       id="fullName" 
                                       th:field="*{fullName}"
                                       th:errorclass="is-invalid"
                                       placeholder="Enter your full name"
                                       required>
                                <div class="invalid-feedback" th:errors="*{fullName}"></div>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    <i class="bi bi-envelope"></i> Email Address <span class="text-danger">*</span>
                                </label>
                                <input type="email" 
                                       class="form-control" 
                                       id="email" 
                                       th:field="*{email}"
                                       th:errorclass="is-invalid"
                                       placeholder="yourname@example.com"
                                       required>
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>

                            <!-- Phone (Optional) -->
                            <div class="mb-3">
                                <label for="phone" class="form-label">
                                    <i class="bi bi-telephone"></i> Phone Number <span class="text-muted">(Optional)</span>
                                </label>
                                <input type="tel" 
                                       class="form-control" 
                                       id="phone" 
                                       th:field="*{phone}"
                                       th:errorclass="is-invalid"
                                       placeholder="9876543210"
                                       pattern="[6-9][0-9]{9}">
                                <div class="form-text">10 digits starting with 6-9</div>
                                <div class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="bi bi-lock"></i> Password <span class="text-danger">*</span>
                                </label>
                                <input type="password" 
                                       class="form-control" 
                                       id="password" 
                                       th:field="*{password}"
                                       th:errorclass="is-invalid"
                                       placeholder="Minimum 6 characters"
                                       required>
                                <div class="invalid-feedback" th:errors="*{password}"></div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">
                                    <i class="bi bi-lock-fill"></i> Confirm Password <span class="text-danger">*</span>
                                </label>
                                <input type="password" 
                                       class="form-control" 
                                       id="confirmPassword" 
                                       th:field="*{confirmPassword}"
                                       th:errorclass="is-invalid"
                                       placeholder="Re-enter your password"
                                       required>
                                <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                            </div>

                            <!-- Terms and Conditions -->
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="#" class="text-decoration-none">Terms & Conditions</a>
                                </label>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check-circle"></i> Create Account
                                </button>
                            </div>
                        </form>

                        <!-- Divider -->
                        <div class="text-center my-4">
                            <span class="text-muted">or</span>
                        </div>

                        <!-- Already have account -->
                        <div class="text-center">
                            <p class="mb-0">Already have an account?</p>
                            <a href="/auth/customer/login" class="btn btn-outline-primary mt-2">
                                <i class="bi bi-box-arrow-in-right"></i> Login to Customer Account
                            </a>
                        </div>

                        <!-- Seller Registration Link -->
                        <div class="text-center mt-3">
                            <p class="text-muted small">
                                Want to sell on Flopkart? 
                                <a href="/auth/seller/signup" class="text-decoration-none">
                                    <i class="bi bi-shop"></i> Register as Seller
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
