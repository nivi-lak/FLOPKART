<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login — Flopkart</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width:400px; margin-top:100px;">
    <div class="card p-4">
        <h3 class="mb-4 text-center">🛒 Flopkart Login</h3>

        <div th:if="${param.error}" class="alert alert-danger">
            Invalid email or password.
        </div>

        <!-- Spring Security reads 'username' and 'password' field names by default -->
        <form th:action="@{/auth/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Login</button>
        </form>
    </div>
</div>
</body>
</html>
