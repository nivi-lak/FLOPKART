<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Flopkart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div th:replace="~{layout :: header}"></div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <h1>Products</h1>
                <p class="text-muted">Add products to cart and test the full Order & Review flow.</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="/cart" class="btn btn-primary btn-lg">
                    🛒 View Cart & Checkout
                </a>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

        <div class="row mt-4">
            <div th:each="product : ${products}" class="col-md-4 mb-4">
                <div class="card h-100">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">
                            <a th:href="@{/products/{id}(id=${product.id})}" th:text="${product.name}">Product Name</a>
                        </h5>
                        <p class="card-text" th:text="${product.description}">Description</p>
                        <p class="text-success fw-bold" th:text="'₹' + ${product.price}">Price</p>
                        <p class="text-muted" th:text="'Stock: ' + ${product.stockQuantity}">Stock</p>
                        <div class="mt-auto">
                            <form th:action="@{/cart/add}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="hidden" name="productId" th:value="${product.id}">
                                <input type="number" name="quantity" value="1" min="1" class="form-control mb-2">
                                <button type="submit" class="btn btn-warning w-100">Add to Cart</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4 text-center">
            <a href="/cart" class="btn btn-success mt-2">View Cart & Checkout</a>
        </div>
    </div>

    <div th:replace="~{layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
